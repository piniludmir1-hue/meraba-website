<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>MERABA Content Admin</title>
  </head>
  <body>
    <button
      id="meraba-admin-logout"
      type="button"
      style="position:fixed;right:16px;bottom:16px;z-index:9999;border:1px solid #d5dce5;background:#fff;color:#07111f;border-radius:999px;padding:9px 14px;font:700 12px Arial,sans-serif;letter-spacing:.04em;text-transform:uppercase;box-shadow:0 12px 36px rgba(7,17,31,.12);cursor:pointer;"
    >
      Log out
    </button>
    <script>
      document.getElementById('meraba-admin-logout').addEventListener('click', function () {
        fetch('/api/admin/logout', { method: 'POST' })
          .then(function () { window.location.href = '/admin-login'; })
          .catch(function () { window.location.href = '/admin-login'; });
      });
    </script>
    <script>
      if (!['localhost', '127.0.0.1'].includes(window.location.hostname)) {
        var identityScript = document.createElement('script');
        identityScript.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
        document.body.appendChild(identityScript);
      }
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/media-original-helper.js"></script>
  </body>
</html>
