backend:
  name: proxy
  proxy_url: /api/decap
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site_settings"
    label: "Global / Site Settings"
    description: "Edit only global company details and contact settings reused across the website."
    files:
      - name: "settings"
        label: "Global Company and Consultant Details"
        file: "src/content/site-settings.json"
        format: "json"
        fields:
          - { label: "Company Name", name: "companyName", widget: "string", hint: "Global company name used across shared settings." }
          - { label: "Website URL", name: "websiteUrl", widget: "string", required: false, hint: "Global website URL used in consultant details." }
          - { label: "Main Email", name: "mainEmail", widget: "string", required: false, hint: "Global company email." }
          - { label: "Phone", name: "phone", widget: "string", required: false, hint: "Global company phone number." }
          - { label: "WhatsApp Number", name: "whatsappNumber", widget: "string", required: false, hint: "Digits only, for example 972533333764." }
          - label: "Contact Messages"
            name: "defaultContactMessages"
            widget: "object"
            collapsed: false
            hint: "Central settings for the prefilled message text used by every public Email and WhatsApp contact link. Recipient emails and WhatsApp number are edited in the fields above/below; these message values are used automatically everywhere."
            fields:
              - { label: "Email Subject", name: "emailSubject", widget: "string", required: false, hint: "Subject used by every public Email link. If empty, the website uses the current default subject so links keep working." }
              - { label: "Email Body", name: "emailBody", widget: "text", required: false, hint: "Body text used by every public Email link. If empty, the website uses the current default body so links keep working." }
              - { label: "WhatsApp Prefilled Message", name: "whatsappPrefilledMessage", widget: "text", required: false, hint: "Message used by every public WhatsApp link. If empty, the website uses the current default message so links keep working." }
          - { label: "Product Consultant Name", name: "productConsultantName", widget: "string", hint: "Appears in the Products page Product Consultant block." }
          - { label: "Product Consultant Initials", name: "productConsultantInitials", widget: "string", hint: "Appears in the Products page Product Consultant avatar." }
          - { label: "Product Consultant Title", name: "productConsultantTitle", widget: "string", hint: "Appears below the consultant name on the Products page." }
          - { label: "Product Consultant Email", name: "productConsultantEmail", widget: "string", hint: "Visible consultant email on the Products page." }
          - { label: "Product Consultant Phone", name: "productConsultantPhone", widget: "string", hint: "Visible consultant phone / WhatsApp number on the Products page." }
          - label: "Unused / Future Fields"
            name: "unusedFutureFields"
            widget: "object"
            collapsed: true
            hint: "These fields are not currently displayed on the public website."
            fields:
              - { label: "Unused Site Tagline", name: "siteTagline", widget: "string", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Legacy Product Consultant WhatsApp Link", name: "productConsultantWhatsapp", widget: "string", required: false, hint: "Legacy stored value only. Public WhatsApp links are generated from WhatsApp Number and Contact Messages." }
              - { label: "Legacy Product Consultant Gmail Compose Link", name: "productConsultantGmail", widget: "string", required: false, hint: "Legacy stored value only. Public email links are generated from recipient email fields and Contact Messages." }

  - name: "header_navigation"
    label: "Header / Navigation"
    description: "Edit site-wide header navigation labels and links."
    files:
      - name: "header"
        label: "Header / Navigation Content"
        file: "src/content/header.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - { label: "Header Logo Accessibility Label", name: "logoAriaLabel", widget: "string", hint: "Screen-reader label for the MERABA logo link." }
          - { label: "Mobile Menu Button Accessibility Label", name: "mobileMenuAriaLabel", widget: "string", hint: "Screen-reader label for the mobile menu button." }
          - label: "Header Navigation Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Navigation links shown in the desktop header and mobile menu. The final item uses the primary button style."
            fields:
              - { label: "Navigation Label", name: "label", widget: "string", hint: "Visible link text." }
              - { label: "Navigation Link", name: "href", widget: "string", hint: "Destination URL, for example /products or /#supply-model." }

  - name: "homepage"
    label: "Homepage"
    description: "Edit homepage content here, in the same order it appears on the public homepage."
    files:
      - name: "homepage"
        label: "Homepage Sections"
        file: "src/content/homepage.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: false
            hint: "This controls the homepage hero text and hero media grid."
            fields:
              - { label: "Homepage Hero Brand Statement", name: "brandStatement", widget: "string", hint: "Visible brand statement in the homepage hero." }
              - { label: "Homepage Hero Main Headline", name: "headline", widget: "text", hint: "Visible main headline in the homepage hero." }
              - label: "Hero Media Mode"
                name: "mediaMode"
                widget: "select"
                options:
                  - { label: "Separate Images", value: "separate" }
                  - { label: "Continuous Single Image", value: "continuous" }
                hint: "Controls only the homepage Hero media grid."
              - label: "Continuous Hero Grid Image"
                name: "continuousImage"
                widget: "object"
                collapsed: true
                hint: "This image is used only in the Homepage Hero section when Hero Media Mode is Continuous Single Image."
                fields:
                  - { label: "Image Upload", name: "src", widget: "image", required: false, hint: "Homepage Hero continuous image. Recommended: 2400 x 2800 px. Minimum: 1800 x 2100 px. Aspect ratio: near-portrait, approx 6:7 to 4:5. Preferred format: high-quality JPG / JPEG or PNG. The hero grid uses background-size: cover across multiple responsive tiles, so cropping is expected. Keep all important products/details in the central 60% and away from tile gaps and outer edges." }
                  - { label: "Image Alt Text", name: "alt", widget: "string", required: false, hint: "Describe the full continuous Hero visual for accessibility." }
                  - { label: "Internal Admin Label", name: "label", widget: "string", required: false, hint: "Internal admin label only. Not displayed publicly." }
              - label: "Homepage Hero Main Image"
                name: "mainImage"
                widget: "object"
                collapsed: true
                hint: "Large image tile in the homepage Hero media grid. Used only on the homepage."
                fields:
                  - { label: "Image Upload", name: "src", widget: "image", required: false, hint: "Homepage Hero large tile. Recommended: 1500 x 2500 px. Minimum: 1200 x 2000 px. Aspect ratio: tall portrait, approx 3:5. Preferred format: WebP or high-quality JPG / JPEG. Rendered with background-size: cover, so responsive crop is expected. Keep the main subject centered inside the central 65% with no important details near edges." }
                  - { label: "Image Alt Text", name: "alt", widget: "string", required: false, hint: "Describe the large homepage Hero image for accessibility." }
                  - { label: "Internal Admin Label", name: "label", widget: "string", required: false, hint: "Internal admin label only. Not displayed publicly." }
              - label: "Homepage Hero Side Image 1"
                name: "sideImage1"
                widget: "object"
                collapsed: true
                hint: "Top small image in the homepage Hero stack. Used only on the homepage."
                fields:
                  - { label: "Image Upload", name: "src", widget: "image", required: false, hint: "Homepage Hero top side tile. Recommended: 1200 x 1500 px. Minimum: 900 x 1125 px. Aspect ratio: 4:5 portrait. Preferred format: WebP or high-quality JPG / JPEG. Rendered with background-size: cover and background-position around 68% 62%, so responsive crop is expected. Keep the subject in the central 60%, with extra margin on all edges." }
                  - { label: "Image Alt Text", name: "alt", widget: "string", required: false, hint: "Describe the top small Hero image for accessibility." }
                  - { label: "Internal Admin Label", name: "label", widget: "string", required: false, hint: "Internal admin label only. Not displayed publicly." }
              - label: "Homepage Hero Side Image 2"
                name: "sideImage2"
                widget: "object"
                collapsed: true
                hint: "Middle small image in the homepage Hero stack. Used only on the homepage."
                fields:
                  - { label: "Image Upload", name: "src", widget: "image", required: false, hint: "Homepage Hero middle side tile. Recommended: 1200 x 1200 px. Minimum: 900 x 900 px. Aspect ratio: 1:1 square. Preferred format: WebP or high-quality JPG / JPEG. Rendered with background-size: cover and background-position around 86% 82%, so crop can favor the lower-right area. Keep important details in the central 60% and avoid edge details." }
                  - { label: "Image Alt Text", name: "alt", widget: "string", required: false, hint: "Describe the middle small Hero image for accessibility." }
                  - { label: "Internal Admin Label", name: "label", widget: "string", required: false, hint: "Internal admin label only. Not displayed publicly." }
              - label: "Homepage Hero Side Image 3"
                name: "sideImage3"
                widget: "object"
                collapsed: true
                hint: "Bottom small image in the homepage Hero stack. Used only on the homepage."
                fields:
                  - { label: "Image Upload", name: "src", widget: "image", required: false, hint: "Homepage Hero bottom side tile. Recommended: 1600 x 1200 px. Minimum: 1200 x 900 px. Aspect ratio: 4:3 landscape. Preferred format: WebP or high-quality JPG / JPEG. Rendered with background-size: cover and background-position around 48% 78%; it can crop differently on mobile. Keep the subject centered in the central 65% with safe margins." }
                  - { label: "Image Alt Text", name: "alt", widget: "string", required: false, hint: "Describe the bottom small Hero image for accessibility." }
                  - { label: "Internal Admin Label", name: "label", widget: "string", required: false, hint: "Internal admin label only. Not displayed publicly." }
          - label: "Homepage Product Areas Section"
            name: "productSection"
            widget: "object"
            collapsed: true
            hint: "Controls the Product Areas heading, note, and buttons. Card content/images are edited in the next Homepage Product Areas file."
            fields:
              - { label: "Homepage Product Areas Section Label", name: "label", widget: "string", hint: "Visible section label above Common Product Areas." }
              - { label: "Homepage Product Areas Section Title", name: "title", widget: "string", hint: "Visible section heading." }
              - { label: "Homepage Product Areas Note Label", name: "noteLabel", widget: "string", hint: "Visible small label inside the homepage Product Areas note box." }
              - { label: "Homepage Product Areas Note Text", name: "subtitle", widget: "text", hint: "Visible note/callout text above the homepage Product Area cards." }
              - { label: "Homepage Product Areas Primary Button Text", name: "primaryCtaText", widget: "string", hint: "Visible primary button text in this section." }
              - { label: "Homepage Product Areas Primary Button Link", name: "primaryCtaLink", widget: "string", hint: "Primary button destination." }
              - { label: "Homepage Product Areas Secondary Button Text", name: "secondaryCtaText", widget: "string", hint: "Visible secondary button text in this section." }
              - { label: "Homepage Product Areas Secondary Button Link", name: "secondaryCtaLink", widget: "string", hint: "Secondary button destination." }
              - label: "Unused / Future Fields"
                name: "unusedFutureFields"
                widget: "object"
                collapsed: true
                hint: "These fields are not currently displayed on the public website."
                fields:
                  - label: "Legacy Homepage Category IDs"
                    name: "legacyCategoryIds"
                    widget: "list"
                    required: false
                    hint: "Not currently displayed. Kept only as a migration reference from the old shared category setup."
                    field: { label: "Legacy Category ID", name: "id", widget: "string", required: false }
          - label: "Why MERABA"
            name: "whyMeraba"
            widget: "object"
            collapsed: true
            hint: "Controls the Why MERABA value section."
            fields:
              - { label: "Homepage Why MERABA Section Label", name: "label", widget: "string", hint: "Visible section label." }
              - { label: "Homepage Why MERABA Section Title", name: "title", widget: "string", hint: "Visible section title." }
              - { label: "Homepage Why MERABA Intro Text", name: "intro", widget: "text", hint: "Visible subtitle under the Why MERABA title." }
              - { label: "Homepage Why MERABA Brand Panel Statement", name: "brandPanelStatement", widget: "text", hint: "Visible three-line brand statement inside the framed Why MERABA panel." }
              - label: "Homepage Why MERABA Value Cards"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Card Title", name: "title", widget: "string", hint: "Visible card title." }
                  - { label: "Card Description", name: "description", widget: "text", hint: "Visible card description." }
          - label: "Supply Model"
            name: "supplyModel"
            widget: "object"
            collapsed: true
            hint: "Controls the How supply starts / Supply Model section."
            fields:
              - { label: "Homepage Supply Model Section Label", name: "label", widget: "string", hint: "Visible section label." }
              - { label: "Homepage Supply Model Section Title", name: "title", widget: "string", hint: "Visible section title." }
              - label: "Homepage Supply Model Steps"
                name: "steps"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Step Title", name: "title", widget: "string", hint: "Visible step title." }
                  - { label: "Step Description", name: "description", widget: "text", hint: "Visible step description." }
          - label: "Final CTA / Contact CTA"
            name: "finalCta"
            widget: "object"
            collapsed: true
            hint: "Controls the final CTA near the bottom of the homepage."
            fields:
              - { label: "Homepage Final CTA Label", name: "label", widget: "string", hint: "Visible CTA label." }
              - { label: "Homepage Final CTA Title", name: "title", widget: "string", hint: "Visible CTA title." }
              - { label: "Homepage Final CTA Text", name: "text", widget: "text", hint: "Visible CTA paragraph." }
              - { label: "Homepage Final CTA Button Text", name: "buttonText", widget: "string", hint: "Visible primary CTA button text." }
              - { label: "Homepage Final CTA Button Link", name: "buttonLink", widget: "string", hint: "Primary CTA button destination." }
              - { label: "Homepage Final CTA Secondary Button Text", name: "secondaryButtonText", widget: "string", hint: "Visible secondary button text. The link comes from Global / Site Settings." }
          - label: "Unused / Future Fields"
            name: "unusedFutureFields"
            widget: "object"
            collapsed: true
            hint: "These fields are not currently displayed on the public website."
            fields:
              - { label: "Unused Homepage Hero Description", name: "homepageHeroDescription", widget: "text", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Unused Homepage Hero Supporting Line", name: "homepageHeroSupportingLine", widget: "text", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Unused Homepage Hero Primary CTA Text", name: "homepageHeroPrimaryCtaText", widget: "string", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Unused Homepage Hero Primary CTA Link", name: "homepageHeroPrimaryCtaLink", widget: "string", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Unused Homepage Hero Secondary CTA Text", name: "homepageHeroSecondaryCtaText", widget: "string", required: false, hint: "Not currently displayed on the public website." }
              - { label: "Unused Homepage Hero Secondary CTA Link", name: "homepageHeroSecondaryCtaLink", widget: "string", required: false, hint: "Not currently displayed on the public website." }
      - name: "homepage_product_areas"
        label: "Homepage Product Areas"
        file: "src/content/homepage-product-areas.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - label: "Homepage Product Area Cards"
            name: "areas"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "These cards appear only in the homepage Product Areas section. They are separate from Products Page Categories."
            fields:
              - { label: "Homepage Product Area ID", name: "id", widget: "string", hint: "Internal homepage card ID. Keep stable unless intentionally changing link behavior." }
              - { label: "Homepage Product Area Title", name: "name", widget: "string", hint: "Visible title on the homepage Product Area card only." }
              - { label: "Homepage Product Area Short Description", name: "shortDescription", widget: "text", hint: "Visible description on the homepage Product Area card only." }
              - { label: "Homepage Product Area Image", name: "image", widget: "image", required: false, hint: "Used only on the homepage Product Areas card. Does not affect Products page images. Required aspect ratio: 4:3. Recommended: 2400 x 1800 px. Minimum: 1600 x 1200 px. Preferred format: WebP or high-quality JPG / JPEG, ideally under 600 KB. Rendered in a fixed 4:3 frame with object-fit: cover; a correctly prepared 4:3 image will not crop except for a tiny hover scale. Keep key details inside the central 90%." }
              - { label: "Homepage Product Area Image Alt Text", name: "imageAlt", widget: "string", required: false, hint: "Describe the homepage Product Area image for accessibility. This affects only the homepage." }
              - { label: "Homepage Product Area Sort Order", name: "sortOrder", widget: "number", value_type: "int", hint: "Sort Order Ã¢â‚¬â€ admin only. Use simple numbers: 1, 2, 3, 4. Lower numbers appear first. This number is not shown publicly." }
              - { label: "Homepage Product Area Active", name: "active", widget: "boolean", default: true, hint: "Turn off to hide this homepage Product Area card only." }
              - { label: "Homepage Empty Image Placeholder Label", name: "placeholderLabel", widget: "string", required: false, hint: "Internal accessibility label for empty homepage media areas. Not normally displayed publicly." }

  - name: "products_page"
    label: "Products Page"
    description: "Edit Products page content here, in the same order it appears on the public Products page."
    files:
      - name: "products_page"
        label: "Products Page Sections"
        file: "src/content/products-page.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - label: "Products Page Hero"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Products Page Hero Label", name: "label", widget: "string", hint: "Visible hero label." }
              - { label: "Products Page Hero Headline", name: "headline", widget: "string", hint: "Visible hero headline." }
              - { label: "Products Page Hero Description", name: "description", widget: "text", hint: "Visible hero description." }
          - label: "Products Page Product Card Settings"
            name: "productGrid"
            widget: "object"
            collapsed: true
            hint: "Visible supporting text used by Products page category cards. Category titles, descriptions, images, and order are edited in Products Page Categories below."
            fields:
              - { label: "Products Page Custom Card Eyebrow", name: "customEyebrow", widget: "string" }
              - { label: "Products Page Custom Card Description", name: "customDescription", widget: "text" }
              - { label: "Products Page Missing Image Placeholder Label", name: "imagePlaceholderLabel", widget: "string", hint: "Small text shown inside Products page media placeholders when no image is uploaded." }
          - label: "Unused / Future Fields"
            name: "unusedFutureFields"
            widget: "object"
            collapsed: true
            hint: "These fields are not currently displayed on the public Products page."
            fields:
              - { label: "Unused Product Card CTA Text", name: "productCardCtaText", widget: "string", required: false, hint: "Not currently displayed on the public Products page." }
              - { label: "Unused Product Card CTA Link", name: "productCardCtaLink", widget: "string", required: false, hint: "Not currently displayed on the public Products page." }
              - { label: "Unused Custom Card CTA Text", name: "customCardCtaText", widget: "string", required: false, hint: "Not currently displayed on the public Products page." }
          - label: "Products Page Product Consultant Block"
            name: "consultantCta"
            widget: "object"
            collapsed: true
            hint: "This appears after the Products page category cards. Consultant contact details come from Global / Site Settings."
            fields:
              - { label: "Products Page Consultant Block Label", name: "label", widget: "string" }
              - { label: "Products Page Consultant Block Title", name: "title", widget: "string" }
              - { label: "Products Page Consultant Block Text", name: "text", widget: "text" }
              - { label: "Products Page WhatsApp Button Text", name: "whatsappButtonText", widget: "string" }
              - { label: "Products Page Email Button Text", name: "emailButtonText", widget: "string" }
              - { label: "Products Page Consultant Phone Label", name: "whatsappDetailLabel", widget: "string" }
              - { label: "Products Page Consultant Email Label", name: "emailDetailLabel", widget: "string" }
          - label: "Products Page Final Quote CTA"
            name: "quoteCta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Products Page Final CTA Label", name: "label", widget: "string" }
              - { label: "Products Page Final CTA Title", name: "title", widget: "string" }
              - { label: "Products Page Final CTA Text", name: "text", widget: "text" }
              - { label: "Products Page Final CTA Button Text", name: "buttonText", widget: "string" }
              - { label: "Products Page Final CTA Button Link", name: "buttonLink", widget: "string" }
              - label: "Unused / Future Fields"
                name: "unusedFutureFields"
                widget: "object"
                collapsed: true
                hint: "These fields are not currently displayed on the public Products page final CTA."
                fields:
                  - label: "Unused Final CTA Detail Cues"
                    name: "details"
                    widget: "list"
                    required: false
                    summary: "{{fields.detail}}"
                    field: { label: "Detail Cue Text", name: "detail", widget: "string" }
      - name: "products_page_categories"
        label: "Products Page Categories"
        file: "src/content/categories.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - label: "Products Page Category Cards"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "These categories affect only Products page category cards. They do not control homepage Product Area cards. The Custom / Requested Products card is a special request/CTA card, not a regular product. It always appears last on the Products page and does not need a Sort Order number."
            fields:
              - { label: "Products Page Category ID", name: "id", widget: "string", hint: "Internal category ID for the Products page." }
              - { label: "Products Page Category Name", name: "name", widget: "string", hint: "Visible category title on the Products page only." }
              - { label: "Products Page Category Short Description", name: "shortDescription", widget: "text", hint: "Visible category description on the Products page only." }
              - { label: "Products Page Category Image", name: "image", widget: "image", required: false, hint: "Used only on the Products page category card. Does not affect homepage Product Area images. Required aspect ratio: 4:3. Recommended: 2400 x 1800 px. Minimum: 1600 x 1200 px. Preferred format: WebP or high-quality JPG / JPEG, ideally under 600 KB. Rendered in a fixed 4:3 frame with object-fit: cover; a correctly prepared 4:3 image will not crop. Keep product family large, centered, and inside the central 90%." }
              - { label: "Products Page Category Image Alt Text", name: "imageAlt", widget: "string", required: false, hint: "Describe the Products page category image for accessibility. This affects only the Products page." }
              - { label: "Products Page Category Sort Order", name: "sortOrder", widget: "number", value_type: "int", required: false, hint: "Sort Order Ã¢â‚¬â€ admin only. Use simple numbers: 1, 2, 3, 4. Lower numbers appear first, left to right across each row. This number is not shown publicly. For the Custom / Requested Products card: This is a special request/CTA card, not a regular product category. It always appears last on the Products page and does not need a normal Sort Order number." }
              - { label: "Products Page Category Active", name: "active", widget: "boolean", default: true, hint: "Turn off to hide this category on the Products page." }
              - label: "Unused / Future Fields"
                name: "unusedFutureFields"
                widget: "object"
                collapsed: true
                hint: "These fields are not currently displayed on the public website."
                fields:
                  - { label: "Internal Image Prompt Label", name: "placeholderLabel", widget: "string", required: false, hint: "Not currently displayed on the public website." }
                  - { label: "Card Type", name: "cardType", widget: "string", required: false, hint: "For Custom / Requested Products only: use request-cta to identify the special request/CTA card. This is not displayed publicly." }
                  - { label: "Special Last Card", name: "isSpecialLastCard", widget: "boolean", required: false, hint: "For Custom / Requested Products only: marks this as the special request/CTA card that always appears last. This is not displayed publicly." }
      - name: "specific_products"
        label: "Specific Products / Optional Product Items Ã¢â‚¬â€ not currently displayed publicly"
        file: "src/content/products.json"
        format: "json"
        fields:
          - { label: "Admin Guide", name: "guide", widget: "text", hint: "Internal admin guide only. Not displayed publicly." }
          - label: "Specific Products / Optional Product Items Ã¢â‚¬â€ not currently displayed publicly"
            name: "products"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "These product items are stored for optional future use. They are not currently displayed on the public Products page unless a visible public section is added later."
            fields:
              - { label: "Specific Product ID", name: "id", widget: "string" }
              - { label: "Specific Product Name", name: "name", widget: "string" }
              - { label: "Related Products Page Category ID", name: "category", widget: "string", hint: "Must match a Products Page Category ID." }
              - { label: "Specific Product Short Description", name: "shortDescription", widget: "text" }
              - { label: "Specific Product Long Description", name: "longDescription", widget: "text", required: false }
              - { label: "Specific Product Image", name: "image", widget: "image", required: false, hint: "Unused / future field. Specific Product cards are not currently displayed publicly. If enabled later, use 4:3 images: recommended 2400 x 1800 px, minimum 1600 x 1200 px, WebP or high-quality JPG / JPEG, with the product centered inside the central 90%." }
              - { label: "Specific Product Image Alt Text", name: "imageAlt", widget: "string", required: false }
              - { label: "Specific Product CTA Text", name: "ctaText", widget: "string", required: false }
              - { label: "Specific Product CTA Link", name: "ctaLink", widget: "string", required: false }
              - { label: "Featured on Homepage", name: "featuredOnHomepage", widget: "boolean", default: false, hint: "Currently not used by the homepage design unless enabled in public code." }
              - { label: "Show on Products Page", name: "showOnProductsPage", widget: "boolean", default: true, hint: "Currently relevant only if specific product cards are enabled in public code." }
